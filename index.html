<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Dartboard Scoreboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
  html,body,#root{margin:0;padding:0;min-height:100%;background:#14140F;}
  #boot-status{
    font-family: -apple-system, sans-serif;
    color:#EDE6D2;
    padding:20px;
    font-size:14px;
    line-height:1.5;
  }
  #boot-error{
    font-family: monospace;
    color:#ff6b6b;
    background:#1a0000;
    padding:14px;
    margin:12px 0;
    border-radius:6px;
    white-space:pre-wrap;
    word-break:break-word;
    font-size:12px;
    display:none;
  }
</style>
</head>
<body>
<div id="root"><div id="boot-status">Loading board…<div id="boot-error"></div></div></div>
<script>
  window.onerror = function (msg, src, line, col, err) {
    var box = document.getElementById("boot-error");
    if (box) {
      box.style.display = "block";
      box.textContent = "Failed to load: " + msg + "\n(" + src + ":" + line + ")";
    }
  };
  window.addEventListener("load", function () {
    setTimeout(function () {
      if (typeof React === "undefined" || typeof ReactDOM === "undefined" || typeof Babel === "undefined") {
        var box = document.getElementById("boot-error");
        if (box) {
          box.style.display = "block";
          box.textContent =
            "One or more scripts didn't load (React: " + (typeof React) +
            ", ReactDOM: " + (typeof ReactDOM) + ", Babel: " + (typeof Babel) +
            "). This is usually a blocked CDN request — try disabling any ad/content blocker for this site, or switch networks/browser.";
        }
      }
    }, 2500);
  });
</script>
<script type="text/babel" data-presets="react">
const { useState, useRef, useCallback, useEffect } = React;


/* ---------------------------------------------------------
   PALETTE
   void      #14140F  background
   felt      #17301F  dartboard felt surround
   feltDeep  #0E2016  darker felt for panels
   brass     #C9A227  rings / accents / borders
   brassDim  #8A7420  muted brass
   dartRed   #B7282E  segment red
   dartGreen #0B6E4F  segment green
   cream     #EDE6D2  primary text
   muted     #8C8873  secondary text
--------------------------------------------------------- */

const COLORS = {
  void: "#14140F",
  felt: "#17301F",
  feltDeep: "#0C1B12",
  brass: "#C9A227",
  brassDim: "#8A7420",
  dartRed: "#B7282E",
  dartGreen: "#0B6E4F",
  cream: "#EDE6D2",
  muted: "#8C8873",
};

const FONT_IMPORT = `@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');`;

/* ---------------------------------------------------------
   SPLIT-FLAP DIGIT — the signature element
--------------------------------------------------------- */
function FlapDigit({ char }) {
  return (
    <span
      key={char}
      style={{
        display: "inline-block",
        fontFamily: "'Bebas Neue', sans-serif",
        fontSize: "clamp(2.2rem, 7vw, 3.6rem)",
        lineHeight: 1,
        color: COLORS.cream,
        background: "linear-gradient(180deg, #201F17 0%, #131209 100%)",
        border: `1px solid ${COLORS.brassDim}`,
        borderRadius: "4px",
        minWidth: "0.85em",
        textAlign: "center",
        padding: "0.1em 0.05em 0.15em",
        margin: "0 2px",
        boxShadow: "inset 0 -2px 4px rgba(0,0,0,0.6), inset 0 2px 2px rgba(255,255,255,0.04)",
        position: "relative",
        animation: "flapIn 260ms cubic-bezier(.2,.8,.3,1)",
      }}
    >
      {char}
      <span
        style={{
          position: "absolute",
          left: 0,
          right: 0,
          top: "50%",
          height: "1px",
          background: "rgba(0,0,0,0.5)",
        }}
      />
    </span>
  );
}

function FlapNumber({ value, digits = 3 }) {
  const str = String(Math.max(0, value)).padStart(digits, "0");
  return (
    <div style={{ display: "flex", justifyContent: "center" }}>
      {str.split("").map((c, i) => (
        <FlapDigit char={c} key={i + "-" + c} />
      ))}
    </div>
  );
}

/* ---------------------------------------------------------
   CAMERA PANEL
--------------------------------------------------------- */
function CameraPanel() {
  const videoRef = useRef(null);
  const [status, setStatus] = useState("idle"); // idle | requesting | live | error
  const [errMsg, setErrMsg] = useState("");

  const startCamera = useCallback(async () => {
    setStatus("requesting");
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false,
      });
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        await videoRef.current.play();
      }
      setStatus("live");
    } catch (err) {
      setErrMsg(
        err && err.name === "NotAllowedError"
          ? "Camera permission was denied."
          : "Couldn't reach a camera on this device."
      );
      setStatus("error");
    }
  }, []);

  useEffect(() => {
    return () => {
      const s = videoRef.current && videoRef.current.srcObject;
      if (s) s.getTracks().forEach((t) => t.stop());
    };
  }, []);

  return (
    <div
      style={{
        background: COLORS.feltDeep,
        border: `2px solid ${COLORS.brassDim}`,
        borderRadius: "10px",
        padding: "10px",
        boxShadow: "0 0 0 1px rgba(201,162,39,0.08), 0 20px 40px rgba(0,0,0,0.5)",
        position: "relative",
      }}
    >
      {/* corner bolts */}
      {["6px,6px", "6px,auto,6px", "auto,6px,auto,6px", "auto,auto,6px,6px"].map((_, i) => (
        <span
          key={i}
          style={{
            position: "absolute",
            width: 8,
            height: 8,
            borderRadius: "50%",
            background: "radial-gradient(circle at 35% 35%, #E4C862, #7A6217)",
            top: i < 2 ? 8 : "auto",
            bottom: i >= 2 ? 8 : "auto",
            left: i % 2 === 0 ? 8 : "auto",
            right: i % 2 === 1 ? 8 : "auto",
          }}
        />
      ))}

      <div
        style={{
          position: "relative",
          aspectRatio: "16 / 10",
          borderRadius: "6px",
          overflow: "hidden",
          background: "#05070A",
        }}
      >
        <video
          ref={videoRef}
          playsInline
          muted
          style={{
            width: "100%",
            height: "100%",
            objectFit: "cover",
            display: status === "live" ? "block" : "none",
          }}
        />

        {status !== "live" && (
          <div
            style={{
              position: "absolute",
              inset: 0,
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              justifyContent: "center",
              gap: "14px",
              padding: "20px",
              textAlign: "center",
            }}
          >
            {/* ambient dartboard rings */}
            <div
              style={{
                position: "absolute",
                inset: 0,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                opacity: 0.35,
              }}
            >
              {[140, 105, 70, 35].map((r, i) => (
                <span
                  key={r}
                  style={{
                    position: "absolute",
                    width: r * 2,
                    height: r * 2,
                    borderRadius: "50%",
                    border: `2px solid ${i % 2 === 0 ? COLORS.dartRed : COLORS.dartGreen}`,
                    animation: `pulseRing 3.2s ease-in-out ${i * 0.25}s infinite`,
                  }}
                />
              ))}
            </div>

            <div style={{ position: "relative", zIndex: 1 }}>
              {status === "error" ? (
                <>
                  <p style={{ color: COLORS.dartRed, fontFamily: "'Inter'", fontWeight: 600, marginBottom: 6 }}>
                    {errMsg}
                  </p>
                  <p style={{ color: COLORS.muted, fontFamily: "'Inter'", fontSize: 13, marginBottom: 14 }}>
                    Check your browser's site permissions and try again.
                  </p>
                </>
              ) : (
                <p style={{ color: COLORS.muted, fontFamily: "'Inter'", fontSize: 14, marginBottom: 14 }}>
                  {status === "requesting" ? "Requesting camera access…" : "Point a camera at the board to go live."}
                </p>
              )}
              <button
                onClick={startCamera}
                disabled={status === "requesting"}
                style={{
                  fontFamily: "'Inter'",
                  fontWeight: 600,
                  fontSize: 14,
                  color: COLORS.void,
                  background: COLORS.brass,
                  border: "none",
                  borderRadius: 6,
                  padding: "10px 20px",
                  cursor: status === "requesting" ? "default" : "pointer",
                  opacity: status === "requesting" ? 0.6 : 1,
                }}
              >
                {status === "error" ? "Try again" : "Enable camera"}
              </button>
            </div>
          </div>
        )}

        {status === "live" && (
          <div
            style={{
              position: "absolute",
              top: 10,
              left: 10,
              display: "flex",
              alignItems: "center",
              gap: 6,
              background: "rgba(10,10,8,0.6)",
              padding: "4px 10px 4px 8px",
              borderRadius: 20,
              backdropFilter: "blur(2px)",
            }}
          >
            <span
              style={{
                width: 8,
                height: 8,
                borderRadius: "50%",
                background: COLORS.dartRed,
                animation: "blink 1.4s ease-in-out infinite",
              }}
            />
            <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: COLORS.cream, letterSpacing: 1 }}>
              LIVE
            </span>
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------------------------------------------------------
   GAME LOGIC HELPERS
--------------------------------------------------------- */
const SEGMENTS = Array.from({ length: 20 }, (_, i) => i + 1);

function newPlayer(name) {
  return { name, score: 0, legs: 0, history: [] };
}

/* ---------------------------------------------------------
   MAIN APP
--------------------------------------------------------- */
function DartScoreboard() {
  const [phase, setPhase] = useState("setup"); // setup | playing | finished
  const [names, setNames] = useState(["Player 1", "Player 2"]);

  const [players, setPlayers] = useState([]);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [turnDarts, setTurnDarts] = useState([]); // {label, value}
  const [multiplier, setMultiplier] = useState(1);
  const [log, setLog] = useState([]);
  const [winner, setWinner] = useState(null);

  const addPlayerField = () => setNames((n) => [...n, `Player ${n.length + 1}`]);
  const removePlayerField = (i) => setNames((n) => n.filter((_, idx) => idx !== i));
  const updateName = (i, val) => setNames((n) => n.map((x, idx) => (idx === i ? val : x)));

  const startGame = () => {
    const cleaned = names.map((n) => n.trim()).filter(Boolean);
    if (cleaned.length === 0) return;
    setPlayers(cleaned.map((n) => newPlayer(n)));
    setCurrentIdx(0);
    setTurnDarts([]);
    setLog([]);
    setWinner(null);
    setPhase("playing");
  };

  const turnTotal = turnDarts.reduce((s, d) => s + d.value, 0);
  const currentPlayer = players[currentIdx];
  const projected = currentPlayer ? currentPlayer.score + turnTotal : 0;

  const throwDart = (segmentValue, label) => {
    if (turnDarts.length >= 3 || phase !== "playing") return;
    const value = segmentValue * multiplier;
    setTurnDarts((d) => [...d, { label, value }]);
    setMultiplier(1);
  };

  const undoDart = () => setTurnDarts((d) => d.slice(0, -1));

  const endTurn = () => {
    if (!currentPlayer) return;
    const total = turnDarts.reduce((s, d) => s + d.value, 0);
    const newScore = currentPlayer.score + total;
    const throwsLabel = turnDarts.map((d) => d.label).join(", ") || "—";

    setPlayers((prev) =>
      prev.map((p, idx) => (idx !== currentIdx ? p : { ...p, score: newScore }))
    );

    setLog((l) => [
      {
        player: currentPlayer.name,
        throws: throwsLabel,
        total,
        result: `+${total} \u2192 ${newScore}`,
      },
      ...l,
    ]);

    setTurnDarts([]);
    setCurrentIdx((i) => (i + 1) % players.length);
  };

  const endMatch = () => {
    if (players.length === 0) return;
    const top = players.reduce((best, p) => (p.score > best.score ? p : best), players[0]);
    setWinner(top.name);
    setPhase("finished");
  };

  const newGame = () => setPhase("setup");

  /* ---------------- SETUP SCREEN ---------------- */
  if (phase === "setup") {
    return (
      <Shell>
        <div style={{ maxWidth: 480, margin: "0 auto", padding: "40px 20px" }}>
          <Header subtitle="Set up your match" />

          <Panel>
            <FieldLabel>Players</FieldLabel>
            {names.map((n, i) => (
              <div key={i} style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                <input
                  value={n}
                  onChange={(e) => updateName(i, e.target.value)}
                  style={inputStyle}
                  placeholder={`Player ${i + 1}`}
                />
                {names.length > 1 && (
                  <button onClick={() => removePlayerField(i)} style={ghostBtn}>
                    ✕
                  </button>
                )}
              </div>
            ))}
            <button onClick={addPlayerField} style={{ ...ghostBtn, width: "100%", marginTop: 4 }}>
              + Add player
            </button>

            <p style={{ fontFamily: "'Inter'", fontSize: 13, color: COLORS.muted, marginTop: 20 }}>
              Everyone starts at 0 — each throw adds to the total.
            </p>

            <button onClick={startGame} style={{ ...primaryBtn, width: "100%", marginTop: 6 }}>
              Start match
            </button>
          </Panel>

          <div style={{ marginTop: 24 }}>
            <CameraPanel />
          </div>
        </div>
      </Shell>
    );
  }

  /* ---------------- FINISHED SCREEN ---------------- */
  if (phase === "finished") {
    return (
      <Shell>
        <div style={{ maxWidth: 480, margin: "0 auto", padding: "60px 20px", textAlign: "center" }}>
          <p style={{ fontFamily: "'JetBrains Mono'", color: COLORS.brass, letterSpacing: 2, fontSize: 12, marginBottom: 10 }}>
            MATCH OVER
          </p>
          <h1
            style={{
              fontFamily: "'Bebas Neue'",
              fontSize: "clamp(2.5rem,10vw,4rem)",
              color: COLORS.cream,
              margin: 0,
            }}
          >
            {winner} wins
          </h1>
          <button onClick={newGame} style={{ ...primaryBtn, marginTop: 30 }}>
            New match
          </button>

          <div style={{ marginTop: 40, textAlign: "left" }}>
            <ThrowLog log={log} />
          </div>
        </div>
      </Shell>
    );
  }

  /* ---------------- PLAYING SCREEN ---------------- */
  return (
    <Shell>
      <div style={{ maxWidth: 1000, margin: "0 auto", padding: "28px 16px 60px" }}>
        <Header subtitle="Live scoring" compact />
        <div style={{ display: "flex", justifyContent: "center", marginTop: -14, marginBottom: 20 }}>
          <button onClick={endMatch} style={{ ...ghostBtn, fontSize: 12 }}>
            End match
          </button>
        </div>

        <div
          style={{
            display: "grid",
            gridTemplateColumns: "1fr",
            gap: 20,
          }}
          className="dart-grid"
        >
          <style>{`
            @media (min-width: 860px) {
              .dart-grid { grid-template-columns: 1.1fr 1fr; }
            }
          `}</style>

          {/* LEFT: camera + log */}
          <div>
            <CameraPanel />
            <div style={{ marginTop: 20 }}>
              <ThrowLog log={log} />
            </div>
          </div>

          {/* RIGHT: scoreboard + keypad */}
          <div>
            <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 20 }}>
              {players.map((p, idx) => (
                <div
                  key={p.name + idx}
                  style={{
                    background: idx === currentIdx ? COLORS.felt : COLORS.feltDeep,
                    border: `1px solid ${idx === currentIdx ? COLORS.brass : COLORS.brassDim}`,
                    borderRadius: 8,
                    padding: "14px 16px",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "space-between",
                    transition: "background 200ms, border-color 200ms",
                  }}
                >
                  <div>
                    <p
                      style={{
                        fontFamily: "'Inter'",
                        fontWeight: 600,
                        fontSize: 14,
                        color: idx === currentIdx ? COLORS.brass : COLORS.muted,
                        margin: 0,
                        marginBottom: 4,
                      }}
                    >
                      {p.name}
                    </p>
                    {idx === currentIdx && turnDarts.length > 0 && (
                      <p style={{ fontFamily: "'JetBrains Mono'", fontSize: 12, color: COLORS.muted, margin: 0 }}>
                        {turnDarts.map((d) => d.label).join(" · ")}
                      </p>
                    )}
                  </div>
                  <FlapNumber value={idx === currentIdx ? Math.max(projected, 0) : p.score} />
                </div>
              ))}
            </div>

            {/* KEYPAD */}
            <Panel>
              <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                {[
                  { m: 1, label: "Single" },
                  { m: 2, label: "Double" },
                  { m: 3, label: "Triple" },
                ].map((opt) => (
                  <button
                    key={opt.m}
                    onClick={() => setMultiplier(opt.m)}
                    style={{
                      ...pillBtn,
                      flex: 1,
                      background: multiplier === opt.m ? COLORS.brass : "transparent",
                      color: multiplier === opt.m ? COLORS.void : COLORS.cream,
                    }}
                  >
                    {opt.label}
                  </button>
                ))}
              </div>

              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "repeat(5, 1fr)",
                  gap: 6,
                  marginBottom: 10,
                }}
              >
                {SEGMENTS.map((n) => (
                  <button
                    key={n}
                    onClick={() => throwDart(n, `${multiplier === 2 ? "D" : multiplier === 3 ? "T" : ""}${n}`)}
                    disabled={turnDarts.length >= 3}
                    style={numBtn}
                  >
                    {n}
                  </button>
                ))}
              </div>

              <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
                <button
                  onClick={() => throwDart(25, multiplier === 2 ? "Bull" : "25")}
                  disabled={turnDarts.length >= 3}
                  style={{ ...numBtn, flex: 1 }}
                >
                  {multiplier === 2 ? "Bullseye (50)" : "25"}
                </button>
                <button
                  onClick={() => throwDart(0, "Miss")}
                  disabled={turnDarts.length >= 3}
                  style={{ ...numBtn, flex: 1, color: COLORS.dartRed }}
                >
                  Miss
                </button>
              </div>

              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={undoDart} disabled={turnDarts.length === 0} style={{ ...ghostBtn, flex: 1 }}>
                  Undo
                </button>
                <button
                  onClick={endTurn}
                  disabled={turnDarts.length === 0}
                  style={{ ...primaryBtn, flex: 2, opacity: turnDarts.length === 0 ? 0.5 : 1 }}
                >
                  End turn ({turnDarts.length}/3 darts)
                </button>
              </div>
            </Panel>
          </div>
        </div>
      </div>
    </Shell>
  );
}

/* ---------------------------------------------------------
   SHARED UI PIECES
--------------------------------------------------------- */
function Shell({ children }) {
  return (
    <div
      style={{
        minHeight: "100vh",
        width: "100%",
        background: `radial-gradient(ellipse at 50% -10%, ${COLORS.felt} 0%, ${COLORS.void} 60%)`,
        color: COLORS.cream,
      }}
    >
      <style>{`
        ${FONT_IMPORT}
        * { box-sizing: border-box; }
        body { margin: 0; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
        @keyframes pulseRing { 0% { transform: scale(0.94); opacity: 0.15; } 50% { transform: scale(1); opacity: 0.4; } 100% { transform: scale(0.94); opacity: 0.15; } }
        @keyframes flapIn {
          0% { transform: rotateX(90deg); opacity: 0.3; }
          60% { transform: rotateX(-10deg); opacity: 1; }
          100% { transform: rotateX(0deg); opacity: 1; }
        }
        button:focus-visible, input:focus-visible {
          outline: 2px solid ${COLORS.brass};
          outline-offset: 2px;
        }
        @media (prefers-reduced-motion: reduce) {
          * { animation: none !important; transition: none !important; }
        }
      `}</style>
      {children}
    </div>
  );
}

function Header({ subtitle, compact }) {
  return (
    <div style={{ textAlign: "center", marginBottom: compact ? 20 : 34 }}>
      <p
        style={{
          fontFamily: "'JetBrains Mono'",
          fontSize: 11,
          letterSpacing: 3,
          color: COLORS.brass,
          margin: 0,
          marginBottom: 6,
        }}
      >
        OCHE · LIVE
      </p>
      <h1
        style={{
          fontFamily: "'Bebas Neue'",
          fontSize: compact ? "clamp(1.8rem,5vw,2.6rem)" : "clamp(2.4rem,8vw,3.6rem)",
          margin: 0,
          letterSpacing: 1,
          color: COLORS.cream,
        }}
      >
        Dartboard Scoreboard
      </h1>
      <p style={{ fontFamily: "'Inter'", fontSize: 13, color: COLORS.muted, marginTop: 6 }}>{subtitle}</p>
    </div>
  );
}

function Panel({ children }) {
  return (
    <div
      style={{
        background: COLORS.feltDeep,
        border: `1px solid ${COLORS.brassDim}`,
        borderRadius: 10,
        padding: 20,
      }}
    >
      {children}
    </div>
  );
}

function FieldLabel({ children, style }) {
  return (
    <p
      style={{
        fontFamily: "'Inter'",
        fontSize: 12,
        fontWeight: 600,
        color: COLORS.muted,
        textTransform: "uppercase",
        letterSpacing: 1,
        marginBottom: 8,
        ...style,
      }}
    >
      {children}
    </p>
  );
}

function ThrowLog({ log }) {
  return (
    <div>
      <FieldLabel>Throw log</FieldLabel>
      <div
        style={{
          background: COLORS.feltDeep,
          border: `1px solid ${COLORS.brassDim}`,
          borderRadius: 8,
          maxHeight: 220,
          overflowY: "auto",
        }}
      >
        {log.length === 0 ? (
          <p style={{ fontFamily: "'Inter'", fontSize: 13, color: COLORS.muted, padding: 16, margin: 0 }}>
            Throws will appear here once the match starts.
          </p>
        ) : (
          log.map((entry, i) => (
            <div
              key={i}
              style={{
                display: "flex",
                justifyContent: "space-between",
                gap: 10,
                padding: "10px 14px",
                borderBottom: i === log.length - 1 ? "none" : `1px solid rgba(201,162,39,0.1)`,
                fontFamily: "'JetBrains Mono'",
                fontSize: 12.5,
              }}
            >
              <span style={{ color: COLORS.cream, minWidth: 90 }}>{entry.player}</span>
              <span style={{ color: COLORS.muted, flex: 1 }}>{entry.throws}</span>
              <span
                style={{
                  color:
                    entry.result === "BUST" ? COLORS.dartRed : entry.result === "CHECKOUT" ? COLORS.brass : COLORS.muted,
                  fontWeight: 700,
                }}
              >
                {entry.result}
              </span>
            </div>
          ))
        )}
      </div>
    </div>
  );
}
