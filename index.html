<script type="text/babel" data-presets="react">
const { useState, useRef, useCallback, useEffect, useLayoutEffect } = React;


/* ---------------------------------------------------------
   PALETTE
--------------------------------------------------------- */
const COLORS = {
  void: "#14140F",
  felt: "#17301F",
  feltDeep: "#0C1B12",
  brass: "#C9A227",
  brassDim: "#8A7420",
  dartRed: "#B7282E",
  dartGreen: "#0B6E4F",
  cream: "#EDE6D2",
  muted: "#8C8873",
};

const FONT_IMPORT = `@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');`;

/* ---------------------------------------------------------
   DARTBOARD GEOMETRY (regulation ratios, relative to the
   outer edge of the double ring = 1.0)
--------------------------------------------------------- */
const RING = {
  bullseye: 0.0374, // double bull (50)
  outerBull: 0.0935, // single bull (25)
  tripleInner: 0.582,
  tripleOuter: 0.629,
  doubleInner: 0.953,
  doubleOuter: 1.0,
};
const SEGMENT_ORDER = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
const SEGMENTS = Array.from({ length: 20 }, (_, i) => i + 1);

function computeThrowFromTap(dx, dy, r) {
  const dist = Math.hypot(dx, dy);
  const frac = dist / r;
  if (frac > 1.06) return { value: 0, label: "Miss" };
  if (frac <= RING.bullseye) return { value: 50, label: "Bull" };
  if (frac <= RING.outerBull) return { value: 25, label: "25" };
  const angle = (Math.atan2(dx, -dy) * 180) / Math.PI;
  const normalized = (angle + 360) % 360;
  const idx = Math.floor(((normalized + 9) % 360) / 18);
  const num = SEGMENT_ORDER[idx];
  let mult = 1;
  if (frac >= RING.tripleInner && frac <= RING.tripleOuter) mult = 3;
  else if (frac >= RING.doubleInner && frac <= RING.doubleOuter) mult = 2;
  const label = `${mult === 3 ? "T" : mult === 2 ? "D" : ""}${num}`;
  return { value: num * mult, label };
}

/* ---------------------------------------------------------
   SPLIT-FLAP DIGIT
--------------------------------------------------------- */
function FlapDigit({ char }) {
  return (
    <span
      key={char}
      style={{
        display: "inline-block",
        fontFamily: "'Bebas Neue', sans-serif",
        fontSize: "clamp(2rem, 6.5vw, 3.4rem)",
        lineHeight: 1,
        color: COLORS.cream,
        background: "linear-gradient(180deg, #201F17 0%, #131209 100%)",
        border: `1px solid ${COLORS.brassDim}`,
        borderRadius: "4px",
        minWidth: "0.85em",
        textAlign: "center",
        padding: "0.1em 0.05em 0.15em",
        margin: "0 2px",
        boxShadow: "inset 0 -2px 4px rgba(0,0,0,0.6), inset 0 2px 2px rgba(255,255,255,0.04)",
        position: "relative",
        animation: "flapIn 260ms cubic-bezier(.2,.8,.3,1)",
      }}
    >
      {char}
      <span
        style={{
          position: "absolute",
          left: 0,
          right: 0,
          top: "50%",
          height: "1px",
          background: "rgba(0,0,0,0.5)",
        }}
      />
    </span>
  );
}

function FlapNumber({ value, digits = 4 }) {
  const str = String(Math.max(0, value)).padStart(digits, "0");
  return (
    <div style={{ display: "flex", justifyContent: "center" }}>
      {str.split("").map((c, i) => (
        <FlapDigit char={c} key={i + "-" + c} />
      ))}
    </div>
  );
}

/* ---------------------------------------------------------
   CAMERA SCORING PANEL
--------------------------------------------------------- */
function CameraScoringPanel({ dartsPerTurn, turnDartsCount, onConfirmThrow }) {
  const videoRef = useRef(null);
  const containerRef = useRef(null);
  const [status, setStatus] = useState("idle"); // idle | requesting | live | error
  const [errMsg, setErrMsg] = useState("");
  const [mode, setMode] = useState("idle"); // idle | calibrate-center | calibrate-edge | score
  const [calib, setCalib] = useState(null); // {cx, cy, r}
  const [tempCenter, setTempCenter] = useState(null);
  const [size, setSize] = useState({ w: 400, h: 250 });
  const [pending, setPending] = useState(null); // {value, label, x, y}

  const startCamera = useCallback(async () => {
    setStatus("requesting");
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false,
      });
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        await videoRef.current.play();
      }
      setStatus("live");
    } catch (err) {
      setErrMsg(
        err && err.name === "NotAllowedError"
          ? "Camera permission was denied."
          : "Couldn't reach a camera on this device."
      );
      setStatus("error");
    }
  }, []);

  useEffect(() => {
    return () => {
      const s = videoRef.current && videoRef.current.srcObject;
      if (s) s.getTracks().forEach((t) => t.stop());
    };
  }, []);

  useLayoutEffect(() => {
    if (!containerRef.current) return;
    const el = containerRef.current;
    const update = () => setSize({ w: el.clientWidth, h: el.clientHeight });
    update();
    const ro = new ResizeObserver(update);
    ro.observe(el);
    return () => ro.disconnect();
  }, [status]);

  const startCalibration = () => {
    setCalib(null);
    setTempCenter(null);
    setPending(null);
    setMode("calibrate-center");
  };

  const handleTap = (e) => {
    if (!containerRef.current) return;
    const rect = containerRef.current.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if (mode === "calibrate-center") {
      setTempCenter({ x, y });
      setMode("calibrate-edge");
      return;
    }
    if (mode === "calibrate-edge" && tempCenter) {
      const r = Math.hypot(x - tempCenter.x, y - tempCenter.y);
      if (r > 4) {
        setCalib({ cx: tempCenter.x, cy: tempCenter.y, r });
        setMode("score");
      }
      return;
    }
    if (mode === "score" && calib && turnDartsCount < dartsPerTurn) {
      const result = computeThrowFromTap(x - calib.cx, y - calib.cy, calib.r);
      setPending({ ...result, x, y });
    }
  };

  const confirmPending = () => {
    if (pending) onConfirmThrow(pending.value, pending.label);
    setPending(null);
  };

  const ringRadii = calib
    ? [RING.bullseye, RING.outerBull, RING.tripleInner, RING.tripleOuter, RING.doubleInner, RING.doubleOuter].map(
        (r) => r * calib.r
      )
    : [];

  return (
    <div
      style={{
        background: COLORS.feltDeep,
        border: `2px solid ${COLORS.brassDim}`,
        borderRadius: "10px",
        padding: "10px",
        boxShadow: "0 0 0 1px rgba(201,162,39,0.08), 0 20px 40px rgba(0,0,0,0.5)",
        position: "relative",
      }}
    >
      {[0, 1, 2, 3].map((i) => (
        <span
          key={i}
          style={{
            position: "absolute",
            width: 8,
            height: 8,
            borderRadius: "50%",
            background: "radial-gradient(circle at 35% 35%, #E4C862, #7A6217)",
            top: i < 2 ? 8 : "auto",
            bottom: i >= 2 ? 8 : "auto",
            left: i % 2 === 0 ? 8 : "auto",
            right: i % 2 === 1 ? 8 : "auto",
          }}
        />
      ))}

      <div
        ref={containerRef}
        style={{
          position: "relative",
          aspectRatio: "16 / 10",
          borderRadius: "6px",
          overflow: "hidden",
          background: "#05070A",
        }}
      >
        <video
          ref={videoRef}
          playsInline
          muted
          style={{
            width: "100%",
            height: "100%",
            objectFit: "cover",
            display: status === "live" ? "block" : "none",
          }}
        />

        {status !== "live" && (
          <div
            style={{
              position: "absolute",
              inset: 0,
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              justifyContent: "center",
              gap: "14px",
              padding: "20px",
              textAlign: "center",
            }}
          >
            <div
              style={{
                position: "absolute",
                inset: 0,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                opacity: 0.35,
              }}
            >
              {[140, 105, 70, 35].map((r, i) => (
                <span
                  key={r}
                  style={{
                    position: "absolute",
                    width: r * 2,
                    height: r * 2,
                    borderRadius: "50%",
                    border: `2px solid ${i % 2 === 0 ? COLORS.dartRed : COLORS.dartGreen}`,
                    animation: `pulseRing 3.2s ease-in-out ${i * 0.25}s infinite`,
                  }}
                />
              ))}
            </div>

            <div style={{ position: "relative", zIndex: 1 }}>
              {status === "error" ? (
                <>
                  <p style={{ color: COLORS.dartRed, fontFamily: "'Inter'", fontWeight: 600, marginBottom: 6 }}>
                    {errMsg}
                  </p>
                  <p style={{ color: COLORS.muted, fontFamily: "'Inter'", fontSize: 13, marginBottom: 14 }}>
                    Check your browser's site permissions and try again.
                  </p>
                </>
              ) : (
                <p style={{ color: COLORS.muted, fontFamily: "'Inter'", fontSize: 14, marginBottom: 14 }}>
                  {status === "requesting" ? "Requesting camera access…" : "Point a camera at the board to go live."}
                </p>
              )}
              <button
                onClick={startCamera}
                disabled={status === "requesting"}
                style={{
                  fontFamily: "'Inter'",
                  fontWeight: 600,
                  fontSize: 14,
                  color: COLORS.void,
                  background: COLORS.brass,
                  border: "none",
                  borderRadius: 6,
                  padding: "10px 20px",
                  cursor: status === "requesting" ? "default" : "pointer",
                  opacity: status === "requesting" ? 0.6 : 1,
                }}
              >
                {status === "error" ? "Try again" : "Enable camera"}
              </button>
            </div>
          </div>
        )}

        {status === "live" && (
          <>
            <svg
              width="100%"
              height="100%"
              viewBox={`0 0 ${size.w} ${size.h}`}
              style={{ position: "absolute", inset: 0, pointerEvents: "none" }}
            >
              {calib &&
                ringRadii.map((r, i) => (
                  <circle
                    key={i}
                    cx={calib.cx}
                    cy={calib.cy}
                    r={r}
                    fill="none"
                    stroke={COLORS.brass}
                    strokeWidth={1}
                    opacity={0.55}
                  />
                ))}
              {calib &&
                Array.from({ length: 20 }).map((_, i) => {
                  const a = ((i * 18 - 9 + 360) % 360) * (Math.PI / 180);
                  const x2 = calib.cx + Math.sin(a) * calib.r * RING.doubleOuter;
                  const y2 = calib.cy - Math.cos(a) * calib.r * RING.doubleOuter;
                  const x1 = calib.cx + Math.sin(a) * calib.r * RING.outerBull;
                  const y1 = calib.cy - Math.cos(a) * calib.r * RING.outerBull;
                  return (
                    <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={COLORS.brass} strokeWidth={0.75} opacity={0.4} />
                  );
                })}
              {tempCenter && mode === "calibrate-edge" && (
                <circle cx={tempCenter.x} cy={tempCenter.y} r={5} fill={COLORS.dartRed} />
              )}
              {pending && (
                <circle cx={pending.x} cy={pending.y} r={7} fill="none" stroke={COLORS.dartRed} strokeWidth={2.5} />
              )}
            </svg>

            <div
              onClick={handleTap}
              style={{
                position: "absolute",
                inset: 0,
                cursor: mode === "idle" || mode === "score" ? "default" : "crosshair",
              }}
            />

            <div
              style={{
                position: "absolute",
                top: 10,
                left: 10,
                display: "flex",
                alignItems: "center",
                gap: 6,
                background: "rgba(10,10,8,0.6)",
                padding: "4px 10px 4px 8px",
                borderRadius: 20,
              }}
            >
              <span
                style={{
                  width: 8,
                  height: 8,
                  borderRadius: "50%",
                  background: COLORS.dartRed,
                  animation: "blink 1.4s ease-in-out infinite",
                }}
              />
              <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: COLORS.cream, letterSpacing: 1 }}>
                LIVE
              </span>
            </div>

            {(mode === "calibrate-center" || mode === "calibrate-edge") && (
              <div
                style={{
                  position: "absolute",
                  bottom: 10,
                  left: 10,
                  right: 10,
                  background: "rgba(10,10,8,0.75)",
                  borderRadius: 6,
                  padding: "8px 12px",
                  fontFamily: "'Inter'",
                  fontSize: 12.5,
                  color: COLORS.cream,
                  textAlign: "center",
                }}
              >
                {mode === "calibrate-center"
                  ? "Tap the bullseye (board center)"
                  : "Now tap the outer edge of the board"}
              </div>
            )}

            {!calib && mode === "idle" && (
              <div style={{ position: "absolute", bottom: 10, left: 10, right: 10, textAlign: "center" }}>
                <button onClick={startCalibration} style={smallBrassBtn}>
                  Calibrate board
                </button>
              </div>
            )}

            {calib && mode === "score" && (
              <div style={{ position: "absolute", bottom: 10, right: 10 }}>
                <button onClick={startCalibration} style={smallGhostBtn}>
                  Recalibrate
                </button>
              </div>
            )}
          </>
        )}
      </div>

      {pending && (
        <div
          style={{
            marginTop: 10,
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            background: COLORS.void,
            border: `1px solid ${COLORS.brassDim}`,
            borderRadius: 8,
            padding: "10px 14px",
          }}
        >
          <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 13, color: COLORS.cream }}>
            Detected <strong style={{ color: COLORS.brass }}>{pending.label}</strong> · {pending.value} pts
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setPending(null)} style={smallGhostBtn}>
              Edit manually
            </button>
            <button onClick={confirmPending} style={smallBrassBtn}>
              Confirm
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------------------------------------------------------
   LEADERBOARD
--------------------------------------------------------- */
function Leaderboard({ players }) {
  const ranked = [...players].sort((a, b) => b.score - a.score);
  return (
    <div>
      <FieldLabel>Leaderboard</FieldLabel>
      <div
        style={{
          background: COLORS.feltDeep,
          border: `1px solid ${COLORS.brassDim}`,
          borderRadius: 8,
          overflow: "hidden",
        }}
      >
        {ranked.map((p, i) => (
          <div
            key={p.name + i}
            style={{
              display: "flex",
              alignItems: "center",
              gap: 12,
              padding: "10px 14px",
              background: i === 0 ? "rgba(201,162,39,0.12)" : "transparent",
              borderBottom: i === ranked.length - 1 ? "none" : `1px solid rgba(201,162,39,0.1)`,
            }}
          >
            <span
              style={{
                fontFamily: "'Bebas Neue'",
                fontSize: 18,
                color: i === 0 ? COLORS.brass : COLORS.muted,
                width: 22,
              }}
            >
              {i + 1}
            </span>
            <span style={{ fontFamily: "'Inter'", fontWeight: 600, fontSize: 14, color: COLORS.cream, flex: 1 }}>
              {p.name}
            </span>
            <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 14, color: COLORS.brass, fontWeight: 700 }}>
              {p.score}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------------------------------------------------------
   GAME HELPERS
--------------------------------------------------------- */
function newPlayer(name) {
  return { name, score: 0 };
}

/* ---------------------------------------------------------
   MAIN APP
--------------------------------------------------------- */
function DartScoreboard() {
  const [phase, setPhase] = useState("setup"); // setup | playing | finished
  const [names, setNames] = useState(["Player 1", "Player 2"]);
  const [dartsPerTurn, setDartsPerTurn] = useState(3);
  const [roundLimitEnabled, setRoundLimitEnabled] = useState(false);
  const [roundLimit, setRoundLimit] = useState(8);

  const [players, setPlayers] = useState([]);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [round, setRound] = useState(1);
  const [turnDarts, setTurnDarts] = useState([]);
  const [multiplier, setMultiplier] = useState(1);
  const [log, setLog] = useState([]);
  const [winner, setWinner] = useState(null);

  const addPlayerField = () => setNames((n) => [...n, `Player ${n.length + 1}`]);
  const removePlayerField = (i) => setNames((n) => n.filter((_, idx) => idx !== i));
  const updateName = (i, val) => setNames((n) => n.map((x, idx) => (idx === i ? val : x)));
  const moveName = (i, dir) => {
    setNames((n) => {
      const arr = [...n];
      const j = i + dir;
      if (j < 0 || j >= arr.length) return arr;
      [arr[i], arr[j]] = [arr[j], arr[i]];
      return arr;
    });
  };

  const startGame = () => {
    const cleaned = names.map((n) => n.trim()).filter(Boolean);
    if (cleaned.length === 0) return;
    setPlayers(cleaned.map((n) => newPlayer(n)));
    setCurrentIdx(0);
    setRound(1);
    setTurnDarts([]);
    setLog([]);
    setWinner(null);
    setPhase("playing");
  };

  const turnTotal = turnDarts.reduce((s, d) => s + d.value, 0);
  const currentPlayer = players[currentIdx];
  const projected = currentPlayer ? currentPlayer.score + turnTotal : 0;

  const throwDart = (segmentValue, label) => {
    if (turnDarts.length >= dartsPerTurn || phase !== "playing") return;
    const value = segmentValue * multiplier;
    setTurnDarts((d) => [...d, { label, value }]);
    setMultiplier(1);
  };

  const addComputedDart = (value, label) => {
    if (turnDarts.length >= dartsPerTurn || phase !== "playing") return;
    setTurnDarts((d) => [...d, { label, value }]);
  };

  const undoDart = () => setTurnDarts((d) => d.slice(0, -1));

  const finishMatchWith = (updatedPlayers) => {
    const top = updatedPlayers.reduce((best, p) => (p.score > best.score ? p : best), updatedPlayers[0]);
    setWinner(top.name);
    setPhase("finished");
  };

  const endTurn = () => {
    if (!currentPlayer) return;
    const total = turnDarts.reduce((s, d) => s + d.value, 0);
    const newScore = currentPlayer.score + total;
    const throwsLabel = turnDarts.map((d) => d.label).join(", ") || "—";
    const updatedPlayers = players.map((p, idx) => (idx !== currentIdx ? p : { ...p, score: newScore }));

    setPlayers(updatedPlayers);
    setLog((l) => [
      { player: currentPlayer.name, throws: throwsLabel, total, result: `+${total} \u2192 ${newScore}` },
      ...l,
    ]);
    setTurnDarts([]);

    const isLastPlayerOfRound = currentIdx === players.length - 1;
    if (isLastPlayerOfRound) {
      if (roundLimitEnabled && round >= roundLimit) {
        finishMatchWith(updatedPlayers);
        return;
      }
      setRound((r) => r + 1);
      setCurrentIdx(0);
    } else {
      setCurrentIdx((i) => i + 1);
    }
  };

  const endMatch = () => {
    if (players.length === 0) return;
    finishMatchWith(players);
  };

  const newGame = () => setPhase("setup");

  /* ---------------- SETUP SCREEN ---------------- */
  if (phase === "setup") {
    return (
      <Shell>
        <div style={{ maxWidth: 480, margin: "0 auto", padding: "40px 20px" }}>
          <Header subtitle="Set up your match" />

          <Panel>
            <FieldLabel>Players</FieldLabel>
            {names.map((n, i) => (
              <div key={i} style={{ display: "flex", gap: 6, marginBottom: 8 }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                  <button onClick={() => moveName(i, -1)} disabled={i === 0} style={arrowBtn}>
                    ▲
                  </button>
                  <button onClick={() => moveName(i, 1)} disabled={i === names.length - 1} style={arrowBtn}>
                    ▼
                  </button>
                </div>
                <input
                  value={n}
                  onChange={(e) => updateName(i, e.target.value)}
                  style={inputStyle}
                  placeholder={`Player ${i + 1}`}
                />
                {names.length > 1 && (
                  <button onClick={() => removePlayerField(i)} style={ghostBtn}>
                    ✕
                  </button>
                )}
              </div>
            ))}
            <button onClick={addPlayerField} style={{ ...ghostBtn, width: "100%", marginTop: 4 }}>
              + Add player
            </button>

            <p style={{ fontFamily: "'Inter'", fontSize: 13, color: COLORS.muted, marginTop: 20 }}>
              Everyone starts at 0 — each throw adds to the total.
            </p>

            <FieldLabel style={{ marginTop: 20 }}>Darts per turn</FieldLabel>
            <Stepper value={dartsPerTurn} onChange={setDartsPerTurn} min={1} max={9} />

            <label
              style={{
                display: "flex",
                alignItems: "center",
                gap: 10,
                marginTop: 22,
                fontFamily: "'Inter'",
                fontSize: 14,
                color: COLORS.cream,
                cursor: "pointer",
              }}
            >
              <input
                type="checkbox"
                checked={roundLimitEnabled}
                onChange={(e) => setRoundLimitEnabled(e.target.checked)}
                style={{ width: 16, height: 16, accentColor: COLORS.brass }}
              />
              Limit the match to a fixed number of rounds
            </label>

            {roundLimitEnabled && (
              <div style={{ marginTop: 12 }}>
                <FieldLabel>Rounds</FieldLabel>
                <Stepper value={roundLimit} onChange={setRoundLimit} min={1} max={99} />
              </div>
            )}

            <button onClick={startGame} style={{ ...primaryBtn, width: "100%", marginTop: 26 }}>
              Start match
            </button>
          </Panel>
        </div>
      </Shell>
    );
  }

  /* ---------------- FINISHED SCREEN ---------------- */
  if (phase === "finished") {
    return (
      <Shell>
        <div style={{ maxWidth: 480, margin: "0 auto", padding: "60px 20px", textAlign: "center" }}>
          <p style={{ fontFamily: "'JetBrains Mono'", color: COLORS.brass, letterSpacing: 2, fontSize: 12, marginBottom: 10 }}>
            MATCH OVER
          </p>
          <h1 style={{ fontFamily: "'Bebas Neue'", fontSize: "clamp(2.5rem,10vw,4rem)", color: COLORS.cream, margin: 0 }}>
            {winner} wins
          </h1>
          <button onClick={newGame} style={{ ...primaryBtn, marginTop: 30, marginBottom: 30 }}>
            New match
          </button>

          <div style={{ textAlign: "left" }}>
            <Leaderboard players={players} />
          </div>

          <div style={{ marginTop: 24, textAlign: "left" }}>
            <ThrowLog log={log} />
          </div>
        </div>
      </Shell>
    );
  }

  /* ---------------- PLAYING SCREEN ---------------- */
  return (
    <Shell>
      <div style={{ maxWidth: 1000, margin: "0 auto", padding: "28px 16px 60px" }}>
        <Header subtitle={`Round ${round}${roundLimitEnabled ? ` / ${roundLimit}` : ""}`} compact />
        <div style={{ display: "flex", justifyContent: "center", marginTop: -14, marginBottom: 20 }}>
          <button onClick={endMatch} style={{ ...ghostBtn, fontSize: 12 }}>
            End match
          </button>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 20 }} className="dart-grid">
          <style>{`
            @media (min-width: 860px) {
              .dart-grid { grid-template-columns: 1.1fr 1fr; }
            }
          `}</style>

          <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
            <CameraScoringPanel
              dartsPerTurn={dartsPerTurn}
              turnDartsCount={turnDarts.length}
              onConfirmThrow={addComputedDart}
            />
            <Leaderboard players={players} />
            <ThrowLog log={log} />
          </div>

          <div>
            <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 20 }}>
              {players.map((p, idx) => (
                <div
                  key={p.name + idx}
                  style={{
                    background: idx === currentIdx ? COLORS.felt : COLORS.feltDeep,
                    border: `1px solid ${idx === currentIdx ? COLORS.brass : COLORS.brassDim}`,
                    borderRadius: 8,
                    padding: "14px 16px",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "space-between",
                    transition: "background 200ms, border-color 200ms",
                  }}
                >
                  <div>
                    <p
                      style={{
                        fontFamily: "'Inter'",
                        fontWeight: 600,
                        fontSize: 14,
                        color: idx === currentIdx ? COLORS.brass : COLORS.muted,
                        margin: 0,
                        marginBottom: 4,
                      }}
                    >
                      {p.name}
                    </p>
                    {idx === currentIdx && turnDarts.length > 0 && (
                      <p style={{ fontFamily: "'JetBrains Mono'", fontSize: 12, color: COLORS.muted, margin: 0 }}>
                        {turnDarts.map((d) => d.label).join(" · ")}
                      </p>
                    )}
                  </div>
                  <FlapNumber value={idx === currentIdx ? projected : p.score} />
                </div>
              ))}
            </div>

            <Panel>
              <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                {[
                  { m: 1, label: "Single" },
                  { m: 2, label: "Double" },
                  { m: 3, label: "Triple" },
                ].map((opt) => (
                  <button
                    key={opt.m}
                    onClick={() => setMultiplier(opt.m)}
                    style={{
                      ...pillBtn,
                      flex: 1,
                      background: multiplier === opt.m ? COLORS.brass : "transparent",
                      color: multiplier === opt.m ? COLORS.void : COLORS.cream,
                    }}
                  >
                    {opt.label}
                  </button>
                ))}
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 6, marginBottom: 10 }}>
                {SEGMENTS.map((n) => (
                  <button
                    key={n}
                    onClick={() => throwDart(n, `${multiplier === 2 ? "D" : multiplier === 3 ? "T" : ""}${n}`)}
                    disabled={turnDarts.length >= dartsPerTurn}
                    style={numBtn}
                  >
                    {n}
                  </button>
                ))}
              </div>

              <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
                <button
                  onClick={() => throwDart(25, multiplier === 2 ? "Bull" : "25")}
                  disabled={turnDarts.length >= dartsPerTurn}
                  style={{ ...numBtn, flex: 1 }}
                >
                  {multiplier === 2 ? "Bullseye (50)" : "25"}
                </button>
                <button
                  onClick={() => throwDart(0, "Miss")}
                  disabled={turnDarts.length >= dartsPerTurn}
                  style={{ ...numBtn, flex: 1, color: COLORS.dartRed }}
                >
                  Miss
                </button>
              </div>

              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={undoDart} disabled={turnDarts.length === 0} style={{ ...ghostBtn, flex: 1 }}>
                  Undo
                </button>
                <button
                  onClick={endTurn}
                  disabled={turnDarts.length === 0}
                  style={{ ...primaryBtn, flex: 2, opacity: turnDarts.length === 0 ? 0.5 : 1 }}
                >
                  End turn ({turnDarts.length}/{dartsPerTurn} darts)
                </button>
              </div>
            </Panel>
          </div>
        </div>
      </div>
    </Shell>
  );
}

/* ---------------------------------------------------------
   SHARED UI PIECES
--------------------------------------------------------- */
function Shell({ children }) {
  return (
    <div
      style={{
        minHeight: "100vh",
        width: "100%",
        background: `radial-gradient(ellipse at 50% -10%, ${COLORS.felt} 0%, ${COLORS.void} 60%)`,
        color: COLORS.cream,
      }}
    >
      <style>{`
        ${FONT_IMPORT}
        * { box-sizing: border-box; }
        body { margin: 0; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
        @keyframes pulseRing { 0% { transform: scale(0.94); opacity: 0.15; } 50% { transform: scale(1); opacity: 0.4; } 100% { transform: scale(0.94); opacity: 0.15; } }
        @keyframes flapIn {
          0% { transform: rotateX(90deg); opacity: 0.3; }
          60% { transform: rotateX(-10deg); opacity: 1; }
          100% { transform: rotateX(0deg); opacity: 1; }
        }
        button:focus-visible, input:focus-visible {
          outline: 2px solid ${COLORS.brass};
          outline-offset: 2px;
        }
        @media (prefers-reduced-motion: reduce) {
          * { animation: none !important; transition: none !important; }
        }
      `}</style>
      {children}
    </div>
  );
}

function Header({ subtitle, compact }) {
  return (
    <div style={{ textAlign: "center", marginBottom: compact ? 20 : 34 }}>
      <p style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, letterSpacing: 3, color: COLORS.brass, margin: 0, marginBottom: 6 }}>
        OCHE · LIVE
      </p>
      <h1
        style={{
          fontFamily: "'Bebas Neue'",
          fontSize: compact ? "clamp(1.8rem,5vw,2.6rem)" : "clamp(2.4rem,8vw,3.6rem)",
          margin: 0,
          letterSpacing: 1,
          color: COLORS.cream,
        }}
      >
        Dartboard Scoreboard
      </h1>
      <p style={{ fontFamily: "'Inter'", fontSize: 13, color: COLORS.muted, marginTop: 6 }}>{subtitle}</p>
    </div>
  );
}

function Panel({ children }) {
  return (
    <div style={{ background: COLORS.feltDeep, border: `1px solid ${COLORS.brassDim}`, borderRadius: 10, padding: 20 }}>
      {children}
    </div>
  );
}

function FieldLabel({ children, style }) {
  return (
    <p
      style={{
        fontFamily: "'Inter'",
        fontSize: 12,
        fontWeight: 600,
        color: COLORS.muted,
        textTransform: "uppercase",
        letterSpacing: 1,
        marginBottom: 8,
        ...style,
      }}
    >
      {children}
    </p>
  );
}

function Stepper({ value, onChange, min, max }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
      <button onClick={() => onChange(Math.max(min, value - 1))} style={{ ...ghostBtn, width: 40 }}>
        −
      </button>
      <span style={{ fontFamily: "'Bebas Neue'", fontSize: 22, color: COLORS.cream, minWidth: 30, textAlign: "center" }}>
        {value}
      </span>
      <button onClick={() => onChange(Math.min(max, value + 1))} style={{ ...ghostBtn, width: 40 }}>
        +
      </button>
    </div>
  );
}

function ThrowLog({ log }) {
  return (
    <div>
      <FieldLabel>Throw log</FieldLabel>
      <div style={{ background: COLORS.feltDeep, border: `1px solid ${COLORS.brassDim}`, borderRadius: 8, maxHeight: 220, overflowY: "auto" }}>
        {log.length === 0 ? (
          <p style={{ fontFamily: "'Inter'", fontSize: 13, color: COLORS.muted, padding: 16, margin: 0 }}>
            Throws will appear here once the match starts.
          </p>
        ) : (
          log.map((entry, i) => (
            <div
              key={i}
              style={{
                display: "flex",
                justifyContent: "space-between",
                gap: 10,
                padding: "10px 14px",
                borderBottom: i === log.length - 1 ? "none" : `1px solid rgba(201,162,39,0.1)`,
                fontFamily: "'JetBrains Mono'",
                fontSize: 12.5,
              }}
            >
              <span style={{ color: COLORS.cream, minWidth: 90 }}>{entry.player}</span>
              <span style={{ color: COLORS.muted, flex: 1 }}>{entry.throws}</span>
              <span style={{ color: COLORS.brass, fontWeight: 700 }}>{entry.result}</span>
            </div>
          ))
        )}
      </div>
    </div>
  );
}
